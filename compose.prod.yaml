# Production stack for Clash of Dots.
# On the server: create your deploy directory, add `.env` (DB_*, APP_KEY, WorkOS, Reverb, etc.), then:
#   docker compose -p clashofdots -f compose.prod.yaml --env-file .env up -d
#
# GitHub Actions renders __GHCR_IMAGE__ in this file before scp (see .github/workflows/prod_deploy.yml).
# App listens on container :80; host maps 8091 -> 80 (change if 8091 is taken).
# Reverb maps FORWARD_REVERB_PORT (default 8092) -> 8080. Set REVERB_HOST to the internal service name.
#
# IMPORTANT: VITE_REVERB_* are baked into the JS bundle at docker build time (not read from .env at runtime).
# Set them as GitHub Actions secrets (VITE_REVERB_HOST, VITE_REVERB_PORT, VITE_REVERB_SCHEME, VITE_REVERB_APP_KEY)
# to point browsers at the correct public WebSocket endpoint (e.g. wss://clashofdots.com:443).

services:
  app:
    image: __GHCR_IMAGE__
    env_file: .env
    environment:
      WWWUSER: '1337'
      WWWGROUP: '1000'
      DB_HOST: pgsql
      REDIS_HOST: redis
      REVERB_HOST: reverb
    ports:
      - '8091:80'
    networks:
      - clashofdots
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:80/up']
      retries: 3
      timeout: 5s
      start_period: 40s
    restart: unless-stopped

  # Live match simulation (~30 Hz). Without this, Redis has no tick updates for active games.
  game-tick:
    image: __GHCR_IMAGE__
    env_file: .env
    environment:
      WWWUSER: '1337'
      WWWGROUP: '1000'
      DB_HOST: pgsql
      REDIS_HOST: redis
      REVERB_HOST: reverb
    command: 'php artisan game:tick --daemon'
    networks:
      - clashofdots
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_started
    restart: unless-stopped

  # WebSocket server for Echo / live pushes. Map host port if browsers use localhost.
  reverb:
    image: __GHCR_IMAGE__
    env_file: .env
    environment:
      WWWUSER: '1337'
      WWWGROUP: '1000'
      DB_HOST: pgsql
      REDIS_HOST: redis
    command: 'php artisan reverb:start --host=0.0.0.0 --port=8080'
    ports:
      - '${FORWARD_REVERB_PORT:-8092}:8080'
    networks:
      - clashofdots
    depends_on:
      redis:
        condition: service_started
      app:
        condition: service_started
    restart: unless-stopped

  pgsql:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # Postgres 18+ images expect a single mount at /var/lib/postgresql (not .../data).
    # See https://github.com/docker-library/postgres/issues/37
    volumes:
      - clashofdots-pgsql:/var/lib/postgresql
    networks:
      - clashofdots
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:alpine
    volumes:
      - clashofdots-redis:/data
    networks:
      - clashofdots
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      retries: 3
      timeout: 5s
    restart: unless-stopped

networks:
  clashofdots:
    driver: bridge

volumes:
  clashofdots-pgsql:
    driver: local
  clashofdots-redis:
    driver: local
